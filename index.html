<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/header.css">
    <link rel="stylesheet" href="assets/css/footer.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script defer type="module" src="src/core/script.js"></script>
    <script defer src="app.js"></script>
    <title>HotHotHot - Domotique</title>
</head>

<body>
    <header id="main-header"></header>

    <h1 id="dialogTitre">Projet HotHotHot : Gestion des Capteurs</h1>

    <div role="tablist">
        <button id="btnTemp" role="tab" aria-selected="true" aria-controls="partieTemprature">Températures</button>
        <button id="btnHist" role="tab" aria-selected="false" aria-controls="partieHistorique">Historique</button>
    </div>

    <section id="partieTemprature" role="tabpanel" aria-labelledby="dialogTitre"
        aria-describedby="dialogTemperature_interieur">

        <!-- Graphe synthèse -->
        <div id="section-graphe">
            <h2>📊 Synthèse des températures</h2>
            <canvas id="grapheSynthese" role="img"
                aria-label="Graphe à barres des températures intérieure et extérieure"></canvas>
        </div>

        <div id="bordure_interieur" class="capteur-card bordure-verte" aria-live="assertive">
            <h3>Capteur Intérieur</h3>
            <p id="dialogTemperature_interieur">Température :
                <meter id="temperatureMeter_interieur" min="-10" max="40" low="-1" optimum="20" high="30"></meter>
                <span id="O_firstValue_interieur" data-unit="°C">--</span>°C
            </p>
            <p>Min : <span id="tempMin_interieur">--</span> | Max : <span id="tempMax_interieur">--</span></p>
            <p id="commentaire_interieur" hidden></p>
        </div>

        <hr>

        <div id="bordure_exterieur" class="capteur-card bordure-verte" aria-live="assertive">
            <h3>Capteur Extérieur</h3>
            <p id="dialogTemperature_exterieur">Température :
                <meter id="temperatureMeter_exterieur" min="-10" max="40" low="-1" optimum="20" high="30"></meter>
                <span id="O_firstValue_exterieur" data-unit="°C">--</span>°C
            </p>
            <p>Min : <span id="tempMin_exterieur">--</span> | Max : <span id="tempMax_exterieur">--</span></p>
            <p id="commentaire_exterieur" hidden></p>
        </div>

    </section>

    <section id="partieHistorique" role="tabpanel" aria-labelledby="historiqueTitre" hidden>
        <ul id="historique" aria-live="polite">
            <h2 id="historiqueTitre">Historique des températures :</h2>
        </ul>
    </section>

    <footer id="main-footer"></footer>

    <script type="module">
        const MAX_POINTS = 10;

        const etat = {
            labels: [],
            interieur: [],
            exterieur: [],
            dernierLabel: { interieur: null, exterieur: null }
        };

        const ctx = document.getElementById("grapheSynthese").getContext("2d");

        const graphe = new Chart(ctx, {
            type: "bar",
            data: {
                labels: etat.labels,
                datasets: [
                    {
                        label: "Intérieur (°C)",
                        data: etat.interieur,
                        backgroundColor: "rgba(255, 140, 0, 0.75)",
                        borderColor: "rgba(255, 140, 0, 1)",
                        borderWidth: 1.5,
                        borderRadius: 4,
                    },
                    {
                        label: "Extérieur (°C)",
                        data: etat.exterieur,
                        backgroundColor: "rgba(30, 144, 255, 0.75)",
                        borderColor: "rgba(30, 144, 255, 1)",
                        borderWidth: 1.5,
                        borderRadius: 4,
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 400 },
                scales: {
                    y: {
                        min: -10,
                        max: 40,
                        title: { display: true, text: "°C" },
                        grid: { color: "rgba(0,0,0,0.06)" }
                    },
                    x: { grid: { display: false } }
                },
                plugins: {
                    legend: { position: "top" },
                    tooltip: {
                        callbacks: {
                            label: c => `${c.dataset.label} : ${c.parsed.y}°C`
                        }
                    }
                }
            }
        });

        const observateurGraphe = {
            update(valeur, type) {
                const temperature = parseFloat(valeur);
                if (isNaN(temperature)) return;

                const heure = new Date().toLocaleTimeString("fr-FR");

                if (etat.dernierLabel[type] !== heure) {
                    etat.dernierLabel[type] = heure;

                    if (type === "interieur") {
                        etat.labels.push(heure);
                        etat.interieur.push(temperature);
                        if (etat.exterieur.length < etat.labels.length) etat.exterieur.push(null);
                    } else {
                        if (etat.labels.length > 0 && etat.exterieur.length === etat.labels.length) {
                            etat.exterieur[etat.exterieur.length - 1] = temperature;
                        } else {
                            etat.labels.push(heure);
                            etat.exterieur.push(temperature);
                            if (etat.interieur.length < etat.labels.length) etat.interieur.push(null);
                        }
                    }

                    if (etat.labels.length > MAX_POINTS) {
                        etat.labels.shift();
                        etat.interieur.shift();
                        etat.exterieur.shift();
                    }
                } else {
                    const idx = etat.labels.length - 1;
                    if (idx >= 0) {
                        if (type === "interieur") etat.interieur[idx] = temperature;
                        else etat.exterieur[idx] = temperature;
                    }
                }

                graphe.update();
            }
        };

        window.addEventListener("sujetPret", (e) => {
            e.detail.subscribe(observateurGraphe);
        });

        if (window.leSujet) {
            window.leSujet.subscribe(observateurGraphe);
        }
    </script>
</body>

</html>
